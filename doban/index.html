<!DOCTYPE html>
<html lang="ko">
<head>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,sans-serif; }
  body { background:#f4f6f9; color:#222; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; letter-spacing:-0.01em; }

var TOKEN = null;
function sbRpc(fn, body){
  return fetch(SB_URL + '/rest/v1/rpc/' + fn, {
    method:'POST',
    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(body||{})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('('+r.status+') '+t); });
    return r.json();
  });
}
function gs(action, payload) {
  var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function(){ ctrl.abort(); }, 25000) : null;
  var opt = { method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ p_action: action, p_payload: payload || {}, p_pin: TOKEN }) };
  if (ctrl) opt.signal = ctrl.signal;
  return fetch(SB_URL + '/rest/v1/rpc/api', opt).then(function (r) {
    if (timer) clearTimeout(timer);
    if (!r.ok) return r.text().then(function (t) { throw new Error('서버 오류 (' + r.status + ') ' + t); });
    return r.json();
  }).then(function (d) {
    // api() RPC는 결과를 그대로 반환 (all→객체, add→행, 그 외→true)
    return d;
  }).catch(function (e) {
    if (timer) clearTimeout(timer);
    if (e && e.name === 'AbortError') throw new Error('서버 응답이 없어요 (시간 초과)');
    throw e;
  });
}

// 브라우저에서 파일 다운로드 (엑셀·JSON 백업 공통)
function downloadFile(name, content, type){
  var blob=new Blob([content],{type:type}), url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(url);},1500);
}
function pad2(n){ return (n<10?'0':'')+n; }
function todayStr(){ var d=new Date(); return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate()); }

function downloadBackupJSON(){

  ['광고주','작업','로그','입금','실행비','섭외','정보','직원','접속로그','업데이트로그'].forEach(function(t){ out[t]=DB[t]||[]; });
  downloadFile('doban_backup_'+todayStr()+'.json', JSON.stringify(out,null,2), 'application/json');
  toast('📥 전체 데이터 JSON 저장됨');

// 표를 엑셀(CSV)로 — 한글 안 깨지게 BOM 포함
function exportCSV(tab){
  var rows=DB[tab]||[]; if(!rows.length){ toast(tab+' 데이터가 없어요'); return; }
  var cols=Object.keys(rows[0]);
  var cell=function(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  var csv=cols.join(',')+'\n'+rows.map(function(r){ return cols.map(function(c){ return cell(r[c]); }).join(','); }).join('\n');
  downloadFile('doban_'+tab+'_'+todayStr()+'.csv', String.fromCharCode(0xFEFF)+csv, 'text/csv;charset=utf-8'); // BOM=엑셀 한글깨짐 방지
  toast('📊 '+tab+' 엑셀 저장됨 ('+rows.length+'줄)');
}

function tasksOf(id){ return DB.작업.filter(function(t){return t.광고주ID===id;}); }
function contractOf(id){ return tasksOf(id).reduce(function(s,t){return s+(Number(t.금액)||0);},0); }
function roundOf(t){ return Number(t.차수)||1; }
function roundsOf(id){ var s={}; tasksOf(id).forEach(function(t){s[roundOf(t)]=1;}); var a=Object.keys(s).map(Number).sort(function(x,y){return x-y;}); return a.length?a:[1]; }
function maxRoundOf(id){ var a=roundsOf(id); return a[a.length-1]; }
function roundSum(id,r){ return tasksOf(id).filter(function(t){return roundOf(t)===r;}).reduce(function(s,t){return s+(Number(t.금액)||0);},0); }

  var t = tasksOf(id).filter(function(x){return roundOf(x)===r && x.견적명;})[0];
  if (t) return t.견적명;

function clientOrderCmp(a,b){
  var ha=(a.번호!=null&&a.번호!==''), hb=(b.번호!=null&&b.번호!=='');
  if(ha&&hb) return (Number(a.번호)||0)-(Number(b.번호)||0); // 둘 다 번호 → 번호순
  if(ha) return -1; if(hb) return 1;                        // 번호 매긴 건 위로 고정
  return String(b.ID).localeCompare(String(a.ID));          // 나머지는 최신 등록순
}

// ─── 대행비 원장 (외주 실행비 + 지급 관리) ───
var VLEDGER=[];
var PAY_OPEN={};  // 지급상태별 토글 (전부 기본 접힘)
var PAY_VOPEN={}; // 상태 안 · 외주사별 서브토글 (vk = 'req|외주사명')
// 기본값: 줄 돈(요청·예정·미지급)은 펼침 / 지급완료는 접힘 — 안 눌렀으면 undefined라 기본값 적용
function payVOpen(vk){ return !!PAY_VOPEN[vk]; }   // 기본 접힘 — 눌러야 펴짐
function togglePayV(vk){ PAY_VOPEN[vk] = !payVOpen(vk); render(); }
// 명단이 생기는 품목(인플루언서/블로그/체험단)은 명단 대행비 합이 실행비. 그 외는 품목에 직접 입력한 값.
function hasSeedList(t){ return !!seedTypeOf(t.품목); }
function execOfTask(t){
  var ty=seedTypeOf(t.품목); if(!ty) return Number(t.실행비용)||0;
  var r=roundOf(t);
  // 같은 차수·같은 종류 품목이 여러 개면 첫 품목에만 합계를 붙여 중복 방지
  var same=tasksOf(t.광고주ID).filter(function(x){ return roundOf(x)===r && seedTypeOf(x.품목)===ty; });
  if(same.length && same[0].ID!==t.ID) return 0;
  return feeSumOf(t.광고주ID, ty, r);
}
// 원장: 명단 있는 품목은 사람별(섭외)로 잡히므로 품목 단위 외주에서 제외
// 실행비가 잡힌 품목은 자체집행이든 외주든 전부 원장에 올린다 (나간 돈은 다 나간 돈)
// → 원장 총액과 정산 '총 실행비'는 항상 같아야 함
function isOutsource(t){ return !hasSeedList(t) && (Number(t.실행비용)||0)>0; }
// 자체집행/자체실행/직접 = 우리가 직접 쓴 돈. 송금 대상이 아니라 계좌가 필요 없음.
function isSelfName(n){ var v=String(n||'').trim(); return v.indexOf('자체')===0 || v==='직접'; }
// ─── 이름 매칭 ───
// 등록부 닉네임을 명단·실행회사와 이어줌. 띄어쓰기·대소문자·한글 조합(NFC/NFD)이 달라도 같은 사람으로 봄
//   예) '광주맛집루피' = '광주맛집 루피' = '광주맛집  루피'
function vnorm(s){
  s=String(s==null?'':s);
  if(s.normalize) s=s.normalize('NFC');
  return s.replace(/\s+/g,'').toLowerCase();
}
function findVendor(name){
  var vs=DB.vendors||[], t=String(name||'').trim();
  if(!t) return null;
  for(var i=0;i<vs.length;i++){ if(String(vs[i].name||'').trim()===t) return vs[i]; } // 완전일치 우선
  var k=vnorm(t);
  for(var j=0;j<vs.length;j++){ if(vnorm(vs[j].name)===k) return vs[j]; }             // 띄어쓰기만 다른 경우
  return null;
}
// 이 이름으로 원장에 잡혀 있는 대행비 (등록하면 뭐가 연결되는지 보여주려고)
function ledgerHitsOf(name){
  var k=vnorm(name), out=[];
  if(!k) return out;
  (DB.섭외||[]).forEach(function(s){ if(vnorm(s.계정명)===k && (Number(s.fee)||0)>0)
    out.push({store:storeName(s.광고주ID), cost:Number(s.fee)||0}); });
  (DB.실행비||[]).forEach(function(e){ if((Number(e.금액)||0)>0 && (vnorm(e.실행회사)===k || (!String(e.실행회사||'').trim() && vnorm(e.내역)===k)))
    out.push({store:storeName(e.광고주ID), cost:Number(e.금액)||0}); });
  (DB.작업||[]).forEach(function(t){ if(vnorm(t.실행회사)===k && (Number(t.실행비용)||0)>0 && !hasSeedList(t))
    out.push({store:storeName(t.광고주ID), cost:Number(t.실행비용)||0}); });
  return out;
}
function payStateOf(t){ var p=t.pay_status||''; return p==='지급완료'?'done':p==='지급예정'?'due':p==='지급요청'?'req':'unpaid'; }
function togglePay(k){ PAY_OPEN[k]=!PAY_OPEN[k]; render(); }   // 기본 접힘
function setPay(id,o,src){ o.ID=id;
  var tab = src==='cost' ? '실행비' : src==='seed' ? '섭외' : '작업';
  patchLocal(tab,id,o); render();
  if(src==='cost'){ var p={}; for(var k in o) p[k]=o[k]; p['탭']='실행비'; bg(gs('update',p)); }
  else if(src==='seed') bg(gs('updateSeed',o));
  else bg(gs('updateTask',o)); }
// 세금계산서 단계: 미요청 → 발행요청(실무자/회계) → 확인완료(회계) · 프리랜서는 해당 없음
function taxNeeded(vendorName){
  var v=findVendor(vendorName);
  return !!v && (v.vtype==='세금계산서' || v.vtype==='현금영수증');
}
function reqTax(id,src){ setPay(id,{tax_status:'발행요청'},src); toast('🧾 계산서 발행 요청했어요'); }
function okTax(id,src){ setPay(id,{tax_status:'확인완료'},src); toast('🧾 계산서 확인 완료'); }
function undoTax(id,src){ setPay(id,{tax_status:''},src); }
function taxBtns(r,acc){
  if(!taxNeeded(r.vendor)) return '';

// 견적에 항목은 잡혔는데 아직 실행비(나갈 돈)가 안 정해진 것 — 잊지 않게 원장에 남긴다
// ★ 견적서의 '실행' 칸과 똑같은 필드(작업.실행회사/실행비용)를 쓴다. 어느 쪽에 적든 같은 곳에 저장되고,
//   값이 들어가는 순간 이 목록에서 빠지므로 이중 입력이 될 수 없다.
function execPending(idset){
  var out=[];
  (DB.작업||[]).forEach(function(t){
    if(!idset[t.광고주ID]) return;
    var budget=Number(t.금액)||0;
    if(budget<=0) return;                       // 할인·네고 같은 0원 항목은 제외
    if(isSelfName(t.실행회사)) return;           // '자체실행'으로 찍었으면 정리 끝난 것 (나갈 돈 없음)
    var r=roundOf(t);
    if(hasSeedList(t)){                          // 인플루언서·블로그 = 명단에서 사람별로 입력
      var ty=seedTypeOf(t.품목);
      var same=tasksOf(t.광고주ID).filter(function(x){ return roundOf(x)===r && seedTypeOf(x.품목)===ty; });
      if(same.length && same[0].ID!==t.ID) return;   // 같은 차수·종류는 한 줄만
      if(feeSumOf(t.광고주ID, ty, r)>0) return;      // 명단에 한 명이라도 넣었으면 진행 중이라 뺌
      out.push({ t:t, budget:budgetOf(t.광고주ID,ty,r)||budget, seed:true, ty:ty, round:r });
    } else {
      if((Number(t.실행비용)||0)>0) return;           // 견적서에서든 여기서든 실행비가 들어가면 빠짐
      out.push({ t:t, budget:budget, seed:false, round:r });
    }
  });
  return out;
}

function exportVendorLedger(){
  if(!VLEDGER.length){ toast('대행비 내역이 없어요'); return; }
  var cols=['외주사','유형','은행','계좌번호','예금주','매장','견적명','품목','대행비','지급상태','지급예정일','지급일'];
  var cell=function(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  var ST={done:'지급완료',due:'지급예정',req:'지급요청',unpaid:'미지급'};
  var lines=VLEDGER.map(function(r){
    var v=findVendor(r.vendor)||{};
    return [r.vendor,v.vtype||'',v.bank||'',v.account||'',v.holder||'',r.store,r.round,r.item,r.cost,ST[r.st],r.due,r.date].map(cell).join(',');
  });
  var csv='﻿'+cols.join(',')+'\n'+lines.join('\n');
  downloadFile('도반_대행비원장_'+todayStr()+'.csv', csv, 'text/csv;charset=utf-8');
  toast('📥 대행비 원장 CSV 저장됨');
}

// 뭐가 빠졌는지 — 계좌·번호·서류 (유형별로 필요 서류가 다름)
function vendorMissing(v){
  if(v.vtype==='비용항목') return []; // 자체 비용 = 계좌·서류 필요 없음
  var free=(v.vtype==='프리랜서'), m=[];
  if(!String(v.account||'').trim()) m.push('계좌번호');
  if(!String(v.holder||'').trim()) m.push('예금주');
  if(!String((free?v.resident_no:v.biz_no)||'').trim()) m.push(free?'주민번호':'사업자번호');
  if(v.vtype==='세금계산서' && !String(v.tax_email||'').trim()) m.push('계산서 이메일');
  if(!free && !v.doc_bizreg) m.push('사업자등록증');
  if(!v.doc_bankbook) m.push('통장사본');
  if(free && !v.doc_id) m.push('신분증');
  return m;
}
function vendorDone(v){ return !!v.vtype && vendorMissing(v).length===0; }
// 송금 자체를 막는 것만 (서류는 제외 — 서류는 등록부 카드에서 따로 챙김)
function vendorPayBlock(v){
  if(!v || v.vtype==='비용항목') return [];
  var free=(v.vtype==='프리랜서'), m=[];
  if(!String(v.account||'').trim()) m.push('계좌번호');
  if(!String(v.holder||'').trim()) m.push('예금주');
  if(!String((free?v.resident_no:v.biz_no)||'').trim()) m.push(free?'주민번호':'사업자번호');
  return m;
}
// 유형만 찍혀 있고 본인이 실제로 채운 게 하나도 없는 상태 = 아직 '입력 전'
// (우리가 미리 유형만 골라둔 경우 — 링크 보내서 입력을 요청해야 함)
function vendorEmpty(v){
  if(v.vtype==='비용항목') return false; // 자체 비용은 채울 게 없음
  return !String(v.account||'').trim() && !String(v.holder||'').trim() &&
         !String(v.biz_no||'').trim() && !String(v.resident_no||'').trim() &&
         !String(v.tax_email||'').trim() &&
         !v.doc_bizreg && !v.doc_bankbook && !v.doc_id;
}

  });
  var vf=function(v, field, ph, w){ return '<input value="'+esc(v[field]||'')+'" placeholder="'+ph+'" onchange="setVendorField(\''+v.ID+'\',\''+field+'\',this.value)" style="width:'+(w||120)+'px">'; };
  var vsel=function(v){ return '<select onchange="setVendorField(\''+v.ID+'\',\'vtype\',this.value)">'+

  var vdoc=function(v, field, label){ var p=v[field]||'';
    return '<span class="vdoc'+(p?' has':'')+'">'+esc(label)+' '+(p
      ? '<button class="mini-btn" onclick="viewDoc(\''+esc(p)+'\')">👁 보기</button><button class="mini-btn del" onclick="delVendorDoc(\''+v.ID+'\',\''+field+'\',\''+esc(p)+'\')">🗑</button>'
      : '<label class="mini-up">＋ 올리기<input type="file" accept="image/*,application/pdf,.pdf" style="display:none" onchange="uploadVendorDoc(\''+v.ID+'\',\''+field+'\',this)"></label>')+'</span>'; };
  var vcard = function(v){
    var free=(v.vtype==='프리랜서'), open=!!VOPEN[v.ID];
    var need=[free?null:v.doc_bizreg, v.doc_bankbook, free?v.doc_id:null].filter(function(x){return x!==null;});
    var dn=need.filter(Boolean).length, dt=need.length;
    return '<div class="vend-card">'+
      '<div class="vend-head" onclick="toggleVend(\''+v.ID+'\')">'+

// 팔로워 이력 파싱: "2026-07-20|69000\n?|65000" → [{d,n}, ...] (최근이 앞)
// d='?' = 언제 적은 숫자인지 모르는 값 (시트에서 가져왔거나 예전에 날짜 없이 적어둔 것)
function folLog(s){
  return String(s||'').split('\n').map(function(l){
    var p=l.split('|'); return { d:(p[0]||'').trim(), n:Number(p[1])||0 };
  }).filter(function(e){ return e.n; });
}
function folLabel(d){ return (!d || d==='?') ? '날짜 없음' : mmdd(d); }
// 팔로워를 마지막으로 적어둔 날 ('?'거나 기록이 없으면 '')
function folDate(v){ var l=folLog(v&&v.fol_log); var d=l.length?l[0].d:''; return d==='?'?'':d; }
// 오래됐거나 날짜를 모르는 팔로워 수 = 다시 확인해야 함 (90일 기준)
function folStale(v){
  var d=folDate(v); if(!d) return true;
  var t=new Date(d+'T00:00:00'); if(isNaN(t)) return true;
  return (Date.now()-t.getTime()) > 90*24*60*60*1000;
}
// 날짜 짧게 (2026-07-20 → 7/20). 올해가 아니면 연도까지 보여줘서 오타를 못 숨기게
function mmdd(d){
  var m=String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return '';
  var y=m[1], cur=String(new Date().getFullYear());
  return (y===cur?'':y.slice(2)+'.')+Number(m[2])+'/'+Number(m[3]);
}

// 인플루언서별로 묶기 — 같은 사람이면 띄어쓰기 달라도 한 명으로
function influList(){
  var by={};
  (DB.섭외||[]).forEach(function(s){
    if(s.종류!=='인플루언서') return;
    var nm=String(s.계정명||'').trim(); if(!nm) return;
    if(isDeletedClient(s.광고주ID)) return;
    var k=vnorm(nm);
    var g=by[k]||(by[k]={ key:k, name:nm, rows:[], stores:{}, total:0, paid:0, done:0, last:'', lastFee:0 });
    if(nm.length>g.name.length) g.name=nm;       // 제일 완전한 표기를 대표로
    var fee=Number(s.fee)||0, d=String(s.pay_date||seedSchedDate(s)||'');
    g.rows.push({ store:storeName(s.광고주ID), round:roundLabel(s.광고주ID, Number(s.차수)||1),
                  fee:fee, date:seedSchedDate(s), pay:s.pay_status||'', url:s.URL||'', prog:s.진행여부||'' });
    g.stores[storeName(s.광고주ID)]=1;
    g.total+=fee;
    if(s.pay_status==='지급완료') g.paid+=fee;
    if(String(s.진행여부||'')==='게시완료') g.done++;
    if(d>g.last){ g.last=d; if(fee>0) g.lastFee=fee; }
    if(!g.lastFee && fee>0) g.lastFee=fee;
  });
  // 아직 같이 일한 기록이 없어도 명부에 등록된 인플루언서는 목록에 보이게
  // 등록부에만 있는 사람(인플루언서 표시 안 됨)도 담아두고, '등록부에만' 필터에서만 보여줌
  (DB.vendors||[]).forEach(function(v){
    var k=vnorm(v.name); if(!k) return;
    if(v.vtype==='비용항목'){ delete by[k]; return; }     // 커피값 같은 건 사람이 아니라 아예 제외
    if(!by[k]) by[k]={ key:k, name:v.name, rows:[], stores:{}, total:0, paid:0, done:0, last:'', lastFee:0 };
    var g=by[k];
    g.deleted=false; g.onlyReg=false; g.notInf=false;     // 상태는 kind 하나로만 결정
    if(v.kind==='삭제됨') g.deleted=true;
    else if(v.kind==='기타') g.notInf=true;               // 인플루언서 아님(등록부에만 남김)
    else if(v.kind!=='인플루언서') g.onlyReg=true;         // 아직 분류 안 함
  });
  var arr=Object.keys(by).map(function(k){ var g=by[k]; g.cnt=g.rows.length; g.storeN=Object.keys(g.stores).length; return g; });
  var SORT={ cnt:function(a,b){ return b.cnt-a.cnt || b.total-a.total; },
             money:function(a,b){ return b.total-a.total; },
             recent:function(a,b){ return (a.last<b.last?1:(a.last>b.last?-1:0)); },
             name:function(a,b){ return a.name.localeCompare(b.name); } };
  return arr.sort(SORT[INF_SORT]||SORT.cnt);
}
function infCards(){
  var raw=influList(), q=String(INFQ||'').trim().toLowerCase();
  // 필터: 전체 / 인스타 미입력 / 신규(기록없음) / 등록부에만
  var all=raw.filter(function(g){
    if(INF_FILTER==='trash')  return !!g.deleted;

function exportInflu(){
  var all=influList(); if(!all.length){ toast('인플루언서 기록이 없어요'); return; }
  var cell=function(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  var cols=['닉네임','인스타','인스타주소','팔로워','횟수','매장수','매장','첫단가','최근단가','증감','최근작업일','공식단가표','메모'];
  var lines=all.map(function(g){ var v=findVendor(g.name)||{};
    var h=g.rows.filter(function(r){return r.fee>0;}).sort(function(a,b){return a.date<b.date?-1:1;});
    var f=h.length?h[0].fee:0, l=h.length?h[h.length-1].fee:0;
    return [g.name, v.handle||'', v.insta_url||'', v.followers||'', g.cnt, g.storeN,
            Object.keys(g.stores).join(' / '), f, l, (h.length>1?l-f:0), g.last,
            v.price_note||'', v.note||''].map(cell).join(','); });
  downloadFile('도반_인플루언서명부_'+todayStr()+'.csv', String.fromCharCode(0xFEFF)+cols.join(',')+'\n'+lines.join('\n'), 'text/csv;charset=utf-8');
  toast('📥 인플루언서 명부 저장됨 ('+all.length+'명)');
}

// 금액칸 콤마 — 치는 중에 바로 붙되 커서가 안 튀게 (커서 앞 숫자 개수를 기준으로 되돌림)
function fmtNum(el){
  var raw=String(el.value);
  var neg=raw.replace(/[^0-9-]/g,'').charAt(0)==='-';
  var digits=raw.replace(/[^0-9]/g,'');
  var caret = (typeof el.selectionStart==='number') ? el.selectionStart : null;
  var kept = caret===null ? null : raw.slice(0,caret).replace(/[^0-9]/g,'').length;
  var out = digits ? (neg?'-':'')+Number(digits).toLocaleString('ko-KR') : (neg?'-':'');
  if(el.value===out){ return; }               // 바뀐 게 없으면 커서도 안 건드림
  el.value = out;
  if(kept!==null){
    var pos=0, seen=0;
    while(pos<out.length && seen<kept){ if(out.charCodeAt(pos)>=48 && out.charCodeAt(pos)<=57) seen++; pos++; }
    try{ el.setSelectionRange(pos,pos); }catch(e){}
  }
}
function numVal(s){ s=String(s); var neg=s.replace(/[^0-9-]/g,'').charAt(0)==='-'; var n=Number(s.replace(/[^0-9]/g,''))||0; return neg?-n:n; } // 마이너스(할인) 허용
function regField(label,id,ph,type){ return '<div>'+innerField(label,id,ph,type)+'</div>'; }
function innerField(label,id,ph,type){ return '<label>'+label+'</label><input id="'+id+'" type="'+(type||'text')+'" placeholder="'+(ph||'')+'">'; }
function regSelect(label,id,opts,def){ return '<div><label>'+label+'</label><select id="'+id+'">'+opts.map(function(o){return '<option '+(o===def?'selected':'')+'>'+o+'</option>';}).join('')+'</select></div>'; }

function todayStr(){ var d=new Date(); return d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate(); }
function quoteMemoVal(){ var e=document.getElementById('qmemo'); return e?e.value.replace(/\r/g,''):''; }
// 텍스트를 maxW 안에서 여러 줄로 (한글은 공백/글자 단위로 끊음) — 개행(\n)도 존중
function wrapLines(ctx, text, maxW, font){
  ctx.font=font; var out=[];
  String(text==null?'':text).split('\n').forEach(function(para){
    var line='';
    para.split(' ').forEach(function(w){
      if(ctx.measureText(w).width>maxW){ // 한 단어가 너무 길면 글자 단위로
        if(line){ out.push(line); line=''; }
        var ch=''; for(var i=0;i<w.length;i++){ if(ctx.measureText(ch+w[i]).width>maxW){ out.push(ch); ch=w[i]; } else ch+=w[i]; } line=ch;
      } else { var t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW){ out.push(line); line=w; } else line=t; }
    });
    out.push(line);
  });
  return out.length?out:[''];
}
// rows: [[품목, 수량표시(또는''), 단가(또는0/''), 금액]]  totals:{sub,vat,tot} 또는 {tot}만(합계형)

function drawQuote(){
  if(!LASTQ) return;
  var store=LASTQ.store, date=LASTQ.date, subtitle=LASTQ.subtitle, rows=LASTQ.rows, totals=LASTQ.totals;
  var memo=quoteMemoVal().replace(/\s+$/,'');
  var hasVat = totals.vat != null;
  var W=760, pad=40, scale=2, tableTop=180, headRowH=34, lineH=19;
  var colQty=W-330, colPrice=W-180, colAmt=W-pad;

  var wrapped = rows.map(function(r){ return wrapLines(mx, String(r[0]), itemMaxW, itemFont); });
  var rowHs = wrapped.map(function(lines){ return Math.max(46, 14 + lines.length*lineH + 12); });
  var tableH = rowHs.reduce(function(a,b){return a+b;},0);

  var boxH = memo ? (memoLines.length*20 + 42) : 0;
  // y 흐름 계산(캔버스 높이 확정용)

  var sTot = afterTable+34; if(hasVat){ sTot+=26+10; } else { sTot+=6; } sTot+=32; // 총계 baseline y
  var afterTot = sTot+30;
  var memoTop = memo ? afterTot+12 : afterTot;
  var afterMemo = memo ? memoTop+boxH+16 : afterTot;
  var footY = afterMemo+18;
  var H = footY+26;
  var cv=document.createElement('canvas'); cv.width=W*scale; cv.height=H*scale;
  var x=cv.getContext('2d'); x.scale(scale,scale);
  function T(t,px,py,size,color,bold,align){ x.fillStyle=color||'#222'; x.font=(bold?'bold ':'')+size+'px "Malgun Gothic","Apple SD Gothic Neo",sans-serif'; x.textAlign=align||'left'; x.fillText(t,px,py); }
  x.fillStyle='#fff'; x.fillRect(0,0,W,H);
  x.fillStyle='#e8590c'; x.fillRect(0,0,W,7);
  T('견 적 서', pad, 58, 30, '#222', true);
  if(subtitle) T(subtitle, pad, 80, 13, '#e8590c', true);
  T('도반글로벌 유한회사', colAmt, 40, 15, '#222', true, 'right');
  T('사업자등록번호 283-81-04124', colAmt, 61, 12, '#777', false, 'right');
  T('광주광역시 광산구 왕버들로 101, 2층', colAmt, 79, 12, '#777', false, 'right');
  T('TEL 010-2944-1236', colAmt, 97, 12, '#777', false, 'right');
  T(store+' 귀하', pad, 112, 18, '#222', true);
  T('견적일  '+date, colAmt, 112, 13, '#666', false, 'right');
  x.strokeStyle='#eee'; x.lineWidth=1; x.beginPath(); x.moveTo(pad,128); x.lineTo(W-pad,128); x.stroke();
  x.fillStyle='#fafafa'; x.fillRect(pad, tableTop, W-pad*2, headRowH);
  var hy=tableTop+22;
  T('NO', pad+12, hy, 13, '#888', true);
  T('품목', pad+42, hy, 13, '#888', true);
  if(hasVat){ T('식', colQty, hy, 13, '#888', true, 'right'); T('단가', colPrice, hy, 13, '#888', true, 'right'); }
  T('금액', colAmt, hy, 13, '#888', true, 'right');
  var ry=tableTop+headRowH;
  rows.forEach(function(r, idx){
    var rh=rowHs[idx], lines=wrapped[idx], by=ry+26;
    T(String(idx+1), pad+12, by, 13, '#888', false);
    lines.forEach(function(ln,li){ T(ln, pad+42, by+li*lineH, 14, '#222', false); });
    if(hasVat){ T(String(r[1]||''), colQty, by, 13, '#555', false, 'right'); if(r[2]) T(won(r[2]), colPrice, by, 13, '#555', false, 'right'); }
    T(won(r[3]), colAmt, by, 14, '#222', true, 'right');
    x.strokeStyle='#f2f2f2'; x.beginPath(); x.moveTo(pad,ry+rh); x.lineTo(W-pad,ry+rh); x.stroke();
    ry+=rh;
  });
  var sy=afterTable+34;
  if(hasVat){
    T('소계', colPrice, sy, 14, '#666', false, 'right'); T(won(totals.sub), colAmt, sy, 14, '#222', false, 'right'); sy+=26;
    T('부가세 (10%)', colPrice, sy, 14, '#666', false, 'right'); T(won(totals.vat), colAmt, sy, 14, '#222', false, 'right'); sy+=10;
  } else { sy+=6; }
  x.strokeStyle='#ddd'; x.beginPath(); x.moveTo(pad+300,sy); x.lineTo(colAmt,sy); x.stroke(); sy+=32;
  T(hasVat?'총계 (VAT포함)':'합계 (VAT포함)', pad+300, sy, 17, '#222', true, 'left'); T(won(totals.tot)+'원', colAmt, sy, 20, '#e8590c', true, 'right');
  if(memo){
    x.fillStyle='#faf7f3'; x.strokeStyle='#ecddc9'; x.lineWidth=1;
    x.fillRect(pad, memoTop, W-pad*2, boxH); x.strokeRect(pad, memoTop, W-pad*2, boxH);

  lastQuoteName = store.replace(/[\\/:*?"<>|]/g,'') + '_견적서.png';
  document.getElementById('quoteImg').src = cv.toDataURL('image/png');

function clientQuoteImage(id, round){

    var line=(qty>0&&unit>0)?qty*unit:Math.round((Number(t.금액)||0)/1.1); // 부가세 전

  });

// 명단 개수를 견적 수량과 정확히 일치시킴 (부족하면 빈 줄 추가, 넘치면 빈 줄만 삭제 — 채워진 명단은 보존)
function reconcileSeeds(id, r, type){
  var target=tasksOf(id).filter(function(t){return roundOf(t)===r && seedTypeOf(t.품목)===type;}).reduce(function(s,t){return s+(Number(t.수량)||0);},0);
  var existing=(DB.섭외||[]).filter(function(s){return s.광고주ID===id && (s.종류||'인플루언서')===type && (Number(s.차수)||1)===r;});
  var diff=target-existing.length;
  if(diff>0) return gs('addSeedBulk',{광고주ID:id,종류:type,수량:diff,차수:r});
  if(diff<0){
    var empties=existing.filter(function(s){ return !s.계정명 && !s.URL && !s.인스타URL && !s.영수증URL; });
    var toDel=empties.slice(0, -diff).map(function(s){return s.ID;});
    return Promise.all(toDel.map(function(x){ return gs('delete',{탭:'섭외',ID:x}); }));
  }
  return Promise.resolve();
}
function reconcileRound(id, r){ return Promise.all([reconcileSeeds(id,r,'인플루언서'), reconcileSeeds(id,r,'블로그')]); }

function newRound(id){

function ensureVendor(name, kind){
  var nm=String(name||'').trim(); if(!nm) return null;
  var v=findVendor(nm); if(v) return v;
  var tmp={ID:'V'+Date.now(), name:nm, kind:kind||'', share_code:''};
  DB.vendors=(DB.vendors||[]).concat([tmp]);          // 화면 먼저
  bg(gs('addVendor',{name:nm}).then(function(res){
    if(res&&res.ID){ var row=(DB.vendors||[]).filter(function(x){return x.ID===tmp.ID;})[0];
      if(row){ row.ID=res.ID; row.share_code=res.share_code||''; }
      if(kind) return gs('updateVendor',{ID:res.ID, kind:kind});
    }
  }));
  return tmp;

// 이 사람에게 마지막으로 준 대행비 (띄어쓰기 달라도 같은 사람으로 봄)
function lastFeeOf(name, exceptId){
  var k=vnorm(name); if(!k) return null;
  var hit=(DB.섭외||[]).filter(function(s){
    return s.ID!==exceptId && vnorm(s.계정명)===k && (Number(s.fee)||0)>0;
  }).map(function(s){
    return { fee:Number(s.fee)||0, date:String(s.pay_date||seedSchedDate(s)||''), store:storeName(s.광고주ID) };
  }).sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); });   // 최근 것 먼저
  return hit[0]||null;
}
// 계정명을 넣는 순간 지난번 대행비를 채워줌. 이미 적혀 있으면 안 건드림.
function autoFee(sid, name){
  var s=(DB.섭외||[]).filter(function(x){ return x.ID===sid; })[0];
  if(!s || (Number(s.fee)||0)>0) return;
  var last=lastFeeOf(name, sid); if(!last) return;
  patchLocal('섭외', sid, {fee:String(last.fee)});
  rerender();
  bg(gs('updateSeed',{ID:sid, fee:String(last.fee)}));
  toast('💰 '+name+' 지난번 대행비 '+won(last.fee)+'원 넣었어요'+(last.store?' ('+last.store+')':'')+' — 다르면 고치세요');
}

function seedTime(el, sid, field){

  el.classList.toggle('empty', !el.value);

  }
}

  var base=location.origin+location.pathname.replace(/[^/]*$/,'');
  var link=base+'b/?s='+encodeURIComponent(code);

function seedOrderCmp(a,b){

  if(da&&db){ if(da!==db) return da<db?-1:1; }    // 방문/촬영 빠른 날짜가 위

        (target!==list.length ? '<button class="add-row fill" onclick="this.disabled=true;this.textContent=\'맞추는 중…\';syncSeed(\''+id+'\','+r+')">🔄 견적수량('+target+'명)과 맞추기</button> ' : '') +
        '<button class="add-row" onclick="addSeedRow(\''+g[0]+'\','+r+')">+ 행 추가</button>' : '') + '</div>';
    }).join('') : '<div style="color:#bbb;padding:10px 2px;font-size:13px">견적에 '+g[0]+' 항목이 없어요 — 견적서 탭에서 추가하면 여기 생겨요</div>';
    return typeHead + linkCard + blocks + '</div>';
  }).join('');
}
function copyVal(inputId){ var el=document.getElementById(inputId); if(!el) return; navigator.clipboard.writeText(el.value).then(function(){toast('복사됨: '+(el.value||'(빈 값)'));}); }
function addLog(){
  var 내용=document.getElementById('nl내용').value.trim(); if(!내용) return toast('내용을 입력하세요');
  busy(gs('addLog',{광고주ID:CUR,내용:내용,작성자:document.getElementById('nl작성자').value}));
}
function selVal(id){ var e=document.getElementById(id); return e?e.value:''; }
function addPay(){
  var 금액=document.getElementById('np금액').value; if(!금액) return toast('금액을 입력하세요');
  busy(gs('addPayment',{광고주ID:CUR,금액:금액,메모:document.getElementById('np메모').value,차수:selVal('np차수')||CURROUND}));
}
function addCost(){
  var 금액=document.getElementById('nc금액').value; if(!금액) return toast('금액을 입력하세요');
  busy(gs('addCost',{광고주ID:CUR,내역:document.getElementById('nc내역').value,실행회사:document.getElementById('nc회사').value,금액:금액,차수:selVal('nc차수')||CURROUND}));
}
// ─── 정산: 견적 펼침 상세 (품목별 실행비 + 추가 실행비 + 입금) ───
function settleDetail(id, r){
  var costs=(DB.실행비||[]).filter(function(c){return c.광고주ID===id;});
  var pays=(DB.입금||[]).filter(function(p){return p.광고주ID===id;});
  var ts=tasksOf(id).filter(function(t){return roundOf(t)===r;});
  var itemRows = ts.length ? ts.map(function(t){
    var 견적가=Number(t.금액)||0;   // 부가세 포함 (대행비와 기준 통일)
    var exec=execOfTask(t), mg=견적가-exec, rate=견적가>0?Math.round(mg/견적가*100):0;
    var seedTy=seedTypeOf(t.품목);
    return '<tr>' +
      '<td class="q-item"><b>'+esc(t.품목)+'</b>'+(t.세부내용?'<small>'+esc(t.세부내용)+'</small>':'')+'</td>' +
      '<td class="q-amt">'+won(견적가)+'</td>' +
      (seedTy
        ? '<td colspan="2" class="ex-auto-td">📋 <b>'+esc(seedTy)+' 명단</b>에서 자동 — 사람별 대행비 합계 <b>'+won(exec)+'</b>원</td>'
        : '<td><input class="ex-co" list="dl-vendors" value="'+esc(t.실행회사||'')+'" placeholder="실행회사" onchange="setExec(\''+t.ID+'\',\'실행회사\',this.value)"></td>' +
          '<td><input class="ex-amt" inputmode="numeric" value="'+(exec?exec.toLocaleString('ko-KR'):'')+'" placeholder="실행비" oninput="fmtNum(this)" onchange="fmtNum(this);setExec(\''+t.ID+'\',\'실행비용\',this.value)"></td>') +
      '<td class="q-amt" style="color:'+(mg<0?'#c92a2a':'#237a3b')+'">'+won(mg)+' ('+rate+'%)</td></tr>';
  }).join('') : '<tr><td colspan="5" style="color:#bbb;padding:8px">이 견적에 항목이 없어요 (견적서 탭에서 추가)</td></tr>';
  var extraRows=costs.filter(function(c){return (Number(c.차수)||0)===r;}).map(function(x){
    if(SDEDIT[x.ID]) return '<div class="sd-editrow">' +
      '<input class="sd-narae" value="'+esc(x.내역||'')+'" placeholder="내역" onchange="editCost(\''+x.ID+'\',\'내역\',this.value)">' +
      '<input class="sd-co" list="dl-vendors" value="'+esc(x.실행회사||'')+'" placeholder="받는 사람/외주사" onchange="editCost(\''+x.ID+'\',\'실행회사\',this.value)">' +
      '<input type="date" class="sd-dt" value="'+esc(x.날짜||'')+'" title="날짜" onclick="try{this.showPicker()}catch(e){}" onchange="editCost(\''+x.ID+'\',\'날짜\',this.value)">' +
      '<input class="sd-amt" inputmode="numeric" value="'+(Number(x.금액)?Number(x.금액).toLocaleString('ko-KR'):'')+'" placeholder="금액" oninput="fmtNum(this)" onchange="fmtNum(this);editCost(\''+x.ID+'\',\'금액\',this.value)">' +
      '<button class="sd-done" onclick="sdToggle(\''+x.ID+'\')">✓ 완료</button><button class="del" onclick="del(\'실행비\',\''+x.ID+'\')">삭제</button></div>';
    return '<div class="sd-readrow"><div class="grow">'+esc(x.내역||'(내역 없음)')+
        (x.실행회사?' <span class="sd-co-tag">→ '+esc(x.실행회사)+'</span>':' <span class="sd-co-tag warn">→ 받는 사람 미지정</span>')+
        ' — <b>'+won(x.금액)+'원</b><small>'+esc(x.날짜||'')+'</small></div>' +
      '<button class="sd-edit" onclick="sdToggle(\''+x.ID+'\')">✏ 수정</button><button class="del" onclick="del(\'실행비\',\''+x.ID+'\')">삭제</button></div>';
  }).join('');
  var payRows=pays.filter(function(p){return (Number(p.차수)||0)===r;}).map(function(p){
    if(SDEDIT[p.ID]) return '<div class="sd-editrow">' +
      '<span class="sd-lb">입금일</span>' +
      '<input type="date" class="sd-dt" value="'+esc(p.날짜||'')+'" title="입금일 — 눌러서 달력" onclick="try{this.showPicker()}catch(e){}" onchange="editPay(\''+p.ID+'\',\'날짜\',this.value)">' +
      '<input class="sd-amt" inputmode="numeric" value="'+(Number(p.금액)?Number(p.금액).toLocaleString('ko-KR'):'')+'" placeholder="입금액" oninput="fmtNum(this)" onchange="fmtNum(this);editPay(\''+p.ID+'\',\'금액\',this.value)">' +
      '<input class="sd-memo" value="'+esc(p.메모||'')+'" placeholder="메모" onchange="editPay(\''+p.ID+'\',\'메모\',this.value)">' +
      '<button class="sd-done" onclick="sdToggle(\''+p.ID+'\')">✓ 완료</button><button class="del" onclick="del(\'입금\',\''+p.ID+'\')">삭제</button></div>';
    return '<div class="sd-readrow"><div class="grow"><b>'+won(p.금액)+'원</b><small>'+esc(p.날짜)+' '+esc(p.메모)+'</small></div>' +
      '<button class="sd-edit" onclick="sdToggle(\''+p.ID+'\')">✏ 수정</button><button class="del" onclick="del(\'입금\',\''+p.ID+'\')">삭제</button></div>';
  }).join('');
  return '<div class="settle-detail" onclick="event.stopPropagation()">' +
    '<div class="sd-title">📋 '+esc(roundLabel(id,r))+' · 품목별 실행비</div>' +
    '<div class="ss-wrap"><table class="quote qtbl"><thead><tr><th>품목</th><th class="col-amt" title="부가세 포함 청구액">견적가 <span class="vat-i">VAT+</span></th><th>실행회사</th><th class="col-amt" title="부가세 포함 대행비">실행비 <span class="vat-i">VAT+</span></th><th class="col-amt">마진</th></tr></thead><tbody>'+itemRows+'</tbody></table></div>' +
    '<div class="sd-sub">진행 중 추가비용 (이 견적)</div>'+extraRows +
    '<div class="form-grid" style="grid-template-columns:1fr 190px 140px"><input id="ec내역" placeholder="추가 실행비 내역 (예: 교통비)">'+
      '<input id="ec실행회사" list="dl-vendors" placeholder="받는 사람/외주사">'+
      '<input id="ec금액" inputmode="numeric" placeholder="금액(VAT 포함)" oninput="fmtNum(this)"></div>' +
    '<button class="btn-ghost" onclick="addCostRound('+r+')">+ 이 견적에 실행비 추가</button>' +
    '<div class="sd-hint">💡 여기 넣은 비용도 <b>줄 돈</b>이라 🏭 대행비 원장에 자동으로 올라가요 (받는 사람을 적어야 계좌가 연결돼요)</div>' +
    '<div class="sd-sub">입금 (이 견적)</div>'+payRows +
    '<div class="form-grid" style="grid-template-columns:1fr 1fr"><input id="ep금액" inputmode="numeric" placeholder="입금액" oninput="fmtNum(this)"><input id="ep메모" placeholder="메모"></div>' +
    '<button class="btn-ghost" onclick="addPayRound('+r+')">+ 이 견적에 입금 추가</button></div>';
}
function editCost(id, field, val){ if(field==='금액') val=numVal(val); var f={}; f[field]=val; patchLocal('실행비',id,f); rerender(); var p={'탭':'실행비',ID:id}; p[field]=val; bg(gs('update',p)); }
function editPay(id, field, val){ if(field==='금액') val=numVal(val); var f={}; f[field]=val; patchLocal('입금',id,f); rerender(); var p={'탭':'입금',ID:id}; p[field]=val; bg(gs('update',p)); }
function sdToggle(id){ SDEDIT[id]=!SDEDIT[id]; rerender(); }
// 정산 표에서 입금 바로 입력: 기존 있으면 수정(즉시), 없으면 새로 생성
function quickPay(id, r, val){
  var amt=numVal(val);
  var ex=(DB.입금||[]).filter(function(p){return p.광고주ID===id&&(Number(p.차수)||0)===r;});
  if(ex.length){ editPay(ex[0].ID,'금액',amt); return; }
  if(!amt) return;
  var tmp={ID:'tmp'+Date.now(),광고주ID:id,금액:amt,차수:r,날짜:todayISO(),메모:''};
  DB.입금.push(tmp); rerender();
  bg(gs('addPayment',{광고주ID:id,금액:amt,차수:r}).then(function(res){ var row=(DB.입금||[]).filter(function(p){return p.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
}
function addCostRound(r){ var g=function(x){var e=document.getElementById(x);return e?e.value:'';};
  var 내역=g('ec내역'), 실행회사=g('ec실행회사'), 금액=numVal(g('ec금액')); if(!금액) return toast('금액을 입력하세요');
  var tmp={ID:'tmp'+Date.now(),광고주ID:CUR,내역:내역,실행회사:실행회사,금액:금액,차수:r,날짜:todayISO()};
  DB.실행비.push(tmp); rerender(); // 즉시 반영 (대행비 원장에도 바로 올라감)
  bg(gs('addCost',{광고주ID:CUR,내역:내역,실행회사:실행회사,금액:금액,차수:r}).then(function(res){ var row=(DB.실행비||[]).filter(function(c){return c.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
  ['ec내역','ec실행회사','ec금액'].forEach(function(x){ var e=document.getElementById(x); if(e) e.value=''; });
  toast('✅ 추가비용 등록 — 대행비 원장에서 지급 처리하세요');
}
function addPayRound(r){ var g=function(x){var e=document.getElementById(x);return e?e.value:'';}; var 금액=numVal(g('ep금액')), 메모=g('ep메모'); if(!금액) return toast('금액을 입력하세요');
  var tmp={ID:'tmp'+Date.now(),광고주ID:CUR,금액:금액,메모:메모,차수:r,날짜:todayISO()};
  DB.입금.push(tmp); rerender();
  bg(gs('addPayment',{광고주ID:CUR,금액:금액,메모:메모,차수:r}).then(function(res){ var row=(DB.입금||[]).filter(function(p){return p.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
}
function del(tab,id){ if(!confirm('삭제할까요?')) return; DB[tab]=(DB[tab]||[]).filter(function(r){return r.ID!==id;}); rerender(); bg(gs('delete',{탭:tab,ID:id})); }
// 명단(섭외) 삭제: 확인창 없이 바로 삭제, 되돌리기 토스트로 실수 방지
function delSeed(id){
  var row=(DB.섭외||[]).filter(function(r){return r.ID===id;})[0]; if(!row) return;
  var saved=Object.assign({},row);
  DB.섭외=(DB.섭외||[]).filter(function(r){return r.ID!==id;}); rerender();
  bg(gs('delete',{탭:'섭외',ID:id}));
  toastUndo('“'+((saved.계정명||'').trim()||'빈 칸')+'” 삭제됨', function(){ undoSeed(saved); });
}
function undoSeed(saved){
  var keys=['광고주ID','종류','계정명','진행여부','촬영일정','촬영시간','촬영여부','업로드일정','방문일정','방문시간','방문여부','URL','인스타URL','영수증URL','비고','공개','차수'];
  var payload={}; keys.forEach(function(k){ payload[k]=saved[k]!=null?saved[k]:''; }); if(!payload.공개) payload.공개='Y'; if(!payload.차수) payload.차수=1;
  var tmp=Object.assign({ID:'tmp'+Date.now()},payload); DB.섭외.push(tmp); rerender();
  bg(gs('addSeed',payload).then(function(res){ var r=(DB.섭외||[]).filter(function(s){return s.ID===tmp.ID;})[0]; if(r&&res&&res.ID) r.ID=res.ID; }));
  toast('되돌렸어요');
}
function toastUndo(msg, undoFn){
  var t=document.getElementById('toast'); if(!t) return;
  t.innerHTML=''; var span=document.createElement('span'); span.textContent=msg;
  var btn=document.createElement('button'); btn.className='toast-undo'; btn.textContent='되돌리기';
  btn.onclick=function(){ t.style.display='none'; t.innerHTML=''; undoFn(); };
  t.appendChild(span); t.appendChild(btn); t.style.display='block';
  clearTimeout(t._to); t._to=setTimeout(function(){ t.style.display='none'; t.innerHTML=''; },5000);
}

// ─── 신규 광고주 ───
function openNewClient() {
  CUR = null;
  document.getElementById('panel').innerHTML =
  '<div style="display:flex;justify-content:space-between"><h2>+ 광고주 등록</h2>' +
  '<button class="btn-ghost" onclick="closePanel()">✕</button></div>' +
  '<div class="sec"><div class="form-grid">' +
    '<input id="f매장명" placeholder="매장명 *"><input id="f지역" placeholder="지역 (예: 상무지구)">' +
    '<input id="f대표자" placeholder="대표자"><input id="f연락처" placeholder="연락처">' +
    '<input id="f담당직원" placeholder="담당 직원"><input id="f계약금액" type="number" placeholder="계약금액 (VAT포함)">' +
    '<input id="f계약일" type="date" class="full">' +
    '<textarea id="f메모" class="full" rows="2" placeholder="메모"></textarea>' +
    '<button class="btn-primary full" onclick="saveNewClient()">등록</button></div></div>';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('panel').classList.add('open');
}
function saveNewClient() {
  var g = function(id){ return document.getElementById('f'+id).value.trim(); };
  if (!g('매장명')) return toast('매장명은 필수예요');
  busy(gs('addClient',{매장명:g('매장명'),지역:g('지역'),대표자:g('대표자'),연락처:g('연락처'),
    담당직원:g('담당직원'),계약금액:g('계약금액'),계약일:g('계약일'),메모:g('메모')}).then(function(){closePanel();}));
}
