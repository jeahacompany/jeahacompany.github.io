    // api() RPC는 결과를 그대로 반환 (all→객체, add→행, 그 외→true)
    return d;
  }).catch(function (e) {
    if (timer) clearTimeout(timer);
    if (e && e.name === 'AbortError') throw new Error('서버 응답이 없어요 (시간 초과)');
    throw e;
  });
}

function logAccessNow(name){

function tasksOf(id){ return DB.작업.filter(function(t){return t.광고주ID===id;}); }
function contractOf(id){ return tasksOf(id).reduce(function(s,t){return s+(Number(t.금액)||0);},0); }
function roundOf(t){ return Number(t.차수)||1; }
function roundsOf(id){ var s={}; tasksOf(id).forEach(function(t){s[roundOf(t)]=1;}); var a=Object.keys(s).map(Number).sort(function(x,y){return x-y;}); return a.length?a:[1]; }
function maxRoundOf(id){ var a=roundsOf(id); return a[a.length-1]; }
function roundSum(id,r){ return tasksOf(id).filter(function(t){return roundOf(t)===r;}).reduce(function(s,t){return s+(Number(t.금액)||0);},0); }
// 견적 이름: 그 차수 작업의 견적명 있으면 사용, 없으면 새 견적 대기이름 또는 "N차"

function toggleSeed(key){ SEEDOPEN[key]=!SEEDOPEN[key]; if(CUR) openClient(CUR); }
function roundLabel(id, r){
  var t = tasksOf(id).filter(function(x){return roundOf(x)===r && x.견적명;})[0];
  if (t) return t.견적명;
  if (NEWQNAME[id+'_'+r]) return NEWQNAME[id+'_'+r];
  return '견적서'+(r>1?' '+r:'');
}
function roundLabelOr(id, r){ return (Number(r)>0) ? roundLabel(id, Number(r)) : '미지정'; }
function roundSelectHTML(selId, id){
  var rs = roundsOf(id); if(rs.indexOf(CURROUND)<0) rs=rs.concat([CURROUND]).sort(function(a,b){return a-b;});
  return '<select id="'+selId+'" title="어느 견적에 기록할지">'+rs.map(function(r){ return '<option value="'+r+'"'+(r===CURROUND?' selected':'')+'>'+esc(roundLabel(id,r))+'</option>'; }).join('')+'</select>';
}
function execTaskOf(id){ return tasksOf(id).reduce(function(s,t){return s+(Number(t.실행비용)||0);},0); } // 작업(견적항목) 실행비 합
function roundExec(id,r){ return tasksOf(id).filter(function(t){return roundOf(t)===r;}).reduce(function(s,t){return s+(Number(t.실행비용)||0);},0); }
function totalExecOf(id){ return execTaskOf(id) + costSum(id); } // 작업 실행비 + 기타 실행비

// 계정정보를 플랫폼별로 묶어서 렌더 (네이버/인스타/구글/카카오/당근 = 아이디+비번 한 세트 + 바로가기 하나)
var INFO_HIDE = ['상호명','주소','대표자','대표자 연락처']; // 업체정보에서 관리 → 계정정보에선 숨김
var INFO_BASIC = ['담당자','담당자 연락처','플레이스 번호'];
var PLAT_ICON = {'네이버':'🟢','인스타':'📷','구글':'🔵','카카오':'🟡','당근':'🥕'};
function platKey(항목){ var s=String(항목).replace(/\s+/g,''); if(/(비밀번호|비번)$/.test(s)) return {p:s.replace(/(비밀번호|비번)$/,''), kind:'pw'}; if(/아이디$/.test(s)) return {p:s.replace(/아이디$/,''), kind:'id'}; return null; }

function infoGroupHTML(id){
  var infos = infosOf(id), used = {}, basic='', order=[], groups={};
  infos.forEach(function(f){ if(INFO_HIDE.indexOf(f.항목)>=0) used[f.ID]=1; });
  infos.forEach(function(f){ if(INFO_BASIC.indexOf(f.항목)>=0){ used[f.ID]=1; basic += infValRow(f); } });
  // 아이디/비번 → 플랫폼별 자동 묶기 (당근비번·커스텀 포함)
  infos.forEach(function(f){
    if(used[f.ID]) return;
    var k = platKey(f.항목); if(!k) return;
    used[f.ID]=1;
    if(!groups[k.p]){ groups[k.p]={id:null,pw:null}; order.push(k.p); }
    groups[k.p][k.kind]=f;
  });
  var plat = order.map(function(p){
    var g=groups[p], linkRow=g.id||g.pw, link=(linkRow&&linkRow.링크)||'';
    var isCustom = !PLAT_ICON[p];
    var delIds = [g.id&&g.id.ID, g.pw&&g.pw.ID].filter(Boolean);

      (isCustom?'<button class="plat-del" onclick="delInfoGroup('+esc(JSON.stringify(delIds))+')">✕ 삭제</button>':'') + '</div>' +
      (g.id?infValRow(g.id,'아이디'):'') + (g.pw?infValRow(g.pw,'비밀번호'):'') + '</div>';
  }).join('');
  var etc=''; infos.forEach(function(f){ if(!used[f.ID]) etc += infValRow(f, null, true); });
  return (basic?'<div class="inf-list">'+basic+'</div>':'') + plat +
    (etc?'<div style="font-size:12px;color:#999;margin:8px 0 4px">기타 (추가 항목)</div><div class="inf-list">'+etc+'</div>':'');
}

// 텍스트를 maxW 안에서 여러 줄로 (한글은 공백/글자 단위로 끊음) — 개행(\n)도 존중
function wrapLines(ctx, text, maxW, font){
  ctx.font=font; var out=[];
  String(text==null?'':text).split('\n').forEach(function(para){
    var line='';
    para.split(' ').forEach(function(w){
      if(ctx.measureText(w).width>maxW){ // 한 단어가 너무 길면 글자 단위로
        if(line){ out.push(line); line=''; }
        var ch=''; for(var i=0;i<w.length;i++){ if(ctx.measureText(ch+w[i]).width>maxW){ out.push(ch); ch=w[i]; } else ch+=w[i]; } line=ch;
      } else { var t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW){ out.push(line); line=w; } else line=t; }
    });
    out.push(line);
  });
  return out.length?out:[''];
}

function drawQuote(){
  if(!LASTQ) return;
  var store=LASTQ.store, date=LASTQ.date, subtitle=LASTQ.subtitle, rows=LASTQ.rows, totals=LASTQ.totals;
  var memo=quoteMemoVal().replace(/\s+$/,'');
  var hasVat = totals.vat != null;
  var W=760, pad=40, scale=2, tableTop=180, headRowH=34, lineH=19;
  var colQty=W-330, colPrice=W-180, colAmt=W-pad;
  var itemFont='14px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
  var memoFont='13px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
  var mx=document.createElement('canvas').getContext('2d');
  var itemRight = hasVat ? colQty-70 : colAmt-24;      // 품목이 침범하면 안 되는 오른쪽 한계
  var itemMaxW = itemRight - (pad+42);
  var wrapped = rows.map(function(r){ return wrapLines(mx, String(r[0]), itemMaxW, itemFont); });
  var rowHs = wrapped.map(function(lines){ return Math.max(46, 14 + lines.length*lineH + 12); });
  var tableH = rowHs.reduce(function(a,b){return a+b;},0);
  var memoLines = memo ? wrapLines(mx, memo, W-pad*2-28, memoFont) : [];
  var boxH = memo ? (memoLines.length*20 + 42) : 0;

function editQuoteLine(taskId, field, val){
  var t=DB.작업.filter(function(x){return x.ID===taskId;})[0]; if(!t) return;
  var upd={ID:taskId};
  if(field==='수량' || field==='단가'){
    var 수량 = field==='수량' ? (Number(val)||0) : (Number(t.수량)||0);
    var 단가 = field==='단가' ? numVal(val) : (Number(t.단가)||0);
    upd.수량=수량; upd.단가=단가;
    if(수량 && 단가) upd.금액=Math.round(수량*단가*1.1); // 부가세 포함 저장(음수 단가=할인 허용)
    else upd.금액=0;
  } else { upd[field]=val; }
  var r=roundOf(t);
  patchLocal('작업',taskId,upd); rerender(); // 소계·총계 즉시 반영
  bg(gs('updateTask',upd).then(function(){ return reconcileRound(CUR,r); }).then(function(){ return gs('all'); }).then(function(d){ DB=d; if(CUR) openClient(CUR); }));
}

function renameRound(id, r, name){

  if(!ts.length){ openClient(id); return; } // 빈 견적은 이름만 기억

// 명단 개수를 견적 수량과 정확히 일치시킴 (부족하면 빈 줄 추가, 넘치면 빈 줄만 삭제 — 채워진 명단은 보존)
function reconcileSeeds(id, r, type){
  var target=tasksOf(id).filter(function(t){return roundOf(t)===r && seedTypeOf(t.품목)===type;}).reduce(function(s,t){return s+(Number(t.수량)||0);},0);
  var existing=(DB.섭외||[]).filter(function(s){return s.광고주ID===id && (s.종류||'인플루언서')===type && (Number(s.차수)||1)===r;});
  var diff=target-existing.length;
  if(diff>0) return gs('addSeedBulk',{광고주ID:id,종류:type,수량:diff,차수:r});
  if(diff<0){
    var empties=existing.filter(function(s){ return !s.계정명 && !s.URL && !s.인스타URL && !s.영수증URL; });
    var toDel=empties.slice(0, -diff).map(function(s){return s.ID;});
    return Promise.all(toDel.map(function(x){ return gs('delete',{탭:'섭외',ID:x}); }));
  }
  return Promise.resolve();
}
function reconcileRound(id, r){ return Promise.all([reconcileSeeds(id,r,'인플루언서'), reconcileSeeds(id,r,'블로그')]); }

  if(!confirm('「'+label+'」 견적을 통째로 삭제할까요?\n이 견적의 작업·명단·입금·실행비가 모두 사라집니다.')) return;
  var jobs=[];
  (DB.작업||[]).forEach(function(t){ if(t.광고주ID===id && roundOf(t)===r) jobs.push(gs('delete',{탭:'작업',ID:t.ID})); });
  (DB.섭외||[]).forEach(function(s){ if(s.광고주ID===id && (Number(s.차수)||1)===r) jobs.push(gs('delete',{탭:'섭외',ID:s.ID})); });
  (DB.입금||[]).forEach(function(p){ if(p.광고주ID===id && (Number(p.차수)||0)===r) jobs.push(gs('delete',{탭:'입금',ID:p.ID})); });
  (DB.실행비||[]).forEach(function(c){ if(c.광고주ID===id && (Number(c.차수)||0)===r) jobs.push(gs('delete',{탭:'실행비',ID:c.ID})); });
  if(EXTRAROUNDS[id]) EXTRAROUNDS[id]=EXTRAROUNDS[id].filter(function(x){return x!==r;});
  var remaining=roundsOf(id).filter(function(x){return x!==r;});
  CURROUND = remaining.length ? remaining[0] : 1;
  if(SETTLEEXP===r) SETTLEEXP=null;

function newRound(id){

  var r=Math.max.apply(null,[maxRoundOf(id), CURROUND].concat(extras))+1; // 빈 견적 여러 개도 계속 무한 추가
  (EXTRAROUNDS[id]=extras).push(r);

}

function seedTime(el, sid, field){

    if(h<24 && m<60){ setSeed(sid,field,el.value); var ins=[].slice.call(el.closest('table').querySelectorAll('input,select')); var i=ins.indexOf(el); if(i>=0 && ins[i+1]){ ins[i+1].focus(); if(ins[i+1].select) try{ins[i+1].select();}catch(e){} } }

}

      '<button class="sd-done" onclick="sdToggle(\''+x.ID+'\')">✓ 완료</button><button class="del" onclick="del(\'실행비\',\''+x.ID+'\')">삭제</button></div>';
    return '<div class="sd-readrow"><div class="grow">'+esc(x.내역||'(내역 없음)')+' — <b>'+won(x.금액)+'원</b></div>' +
      '<button class="sd-edit" onclick="sdToggle(\''+x.ID+'\')">✏ 수정</button><button class="del" onclick="del(\'실행비\',\''+x.ID+'\')">삭제</button></div>';
  }).join('');
  var payRows=pays.filter(function(p){return (Number(p.차수)||0)===r;}).map(function(p){
    if(SDEDIT[p.ID]) return '<div class="sd-editrow">' +
      '<input class="sd-amt" inputmode="numeric" value="'+(Number(p.금액)?Number(p.금액).toLocaleString('ko-KR'):'')+'" placeholder="입금액" onchange="fmtNum(this);editPay(\''+p.ID+'\',\'금액\',this.value)">' +
      '<input class="sd-memo" value="'+esc(p.메모||'')+'" placeholder="메모" onchange="editPay(\''+p.ID+'\',\'메모\',this.value)">' +
      '<button class="sd-done" onclick="sdToggle(\''+p.ID+'\')">✓ 완료</button><button class="del" onclick="del(\'입금\',\''+p.ID+'\')">삭제</button></div>';
    return '<div class="sd-readrow"><div class="grow"><b>'+won(p.금액)+'원</b><small>'+esc(p.날짜)+' '+esc(p.메모)+'</small></div>' +
      '<button class="sd-edit" onclick="sdToggle(\''+p.ID+'\')">✏ 수정</button><button class="del" onclick="del(\'입금\',\''+p.ID+'\')">삭제</button></div>';
  }).join('');
  return '<div class="settle-detail" onclick="event.stopPropagation()">' +
    '<div class="sd-title">📋 '+esc(roundLabel(id,r))+' · 품목별 실행비</div>' +
    '<div class="ss-wrap"><table class="quote qtbl"><thead><tr><th>품목</th><th class="col-amt">견적가</th><th>실행회사</th><th class="col-amt">실행비</th><th class="col-amt">마진</th></tr></thead><tbody>'+itemRows+'</tbody></table></div>' +
    '<div class="sd-sub">진행 중 추가비용 (이 견적)</div>'+extraRows +
    '<div class="form-grid" style="grid-template-columns:1fr 140px"><input id="ec내역" placeholder="추가 실행비 내역"><input id="ec금액" inputmode="numeric" placeholder="금액" oninput="fmtNum(this)"></div>' +
    '<button class="btn-ghost" onclick="addCostRound('+r+')">+ 이 견적에 실행비 추가</button>' +
    '<div class="sd-sub">입금 (이 견적)</div>'+payRows +
    '<div class="form-grid" style="grid-template-columns:1fr 1fr"><input id="ep금액" inputmode="numeric" placeholder="입금액" oninput="fmtNum(this)"><input id="ep메모" placeholder="메모"></div>' +
    '<button class="btn-ghost" onclick="addPayRound('+r+')">+ 이 견적에 입금 추가</button></div>';
}
function editCost(id, field, val){ if(field==='금액') val=numVal(val); var f={}; f[field]=val; patchLocal('실행비',id,f); rerender(); var p={'탭':'실행비',ID:id}; p[field]=val; bg(gs('update',p)); }
function editPay(id, field, val){ if(field==='금액') val=numVal(val); var f={}; f[field]=val; patchLocal('입금',id,f); rerender(); var p={'탭':'입금',ID:id}; p[field]=val; bg(gs('update',p)); }
function sdToggle(id){ SDEDIT[id]=!SDEDIT[id]; rerender(); }
// 정산 표에서 입금 바로 입력: 기존 있으면 수정(즉시), 없으면 새로 생성
function quickPay(id, r, val){
  var amt=numVal(val);
  var ex=(DB.입금||[]).filter(function(p){return p.광고주ID===id&&(Number(p.차수)||0)===r;});
  if(ex.length){ editPay(ex[0].ID,'금액',amt); return; }
  if(!amt) return;
  var tmp={ID:'tmp'+Date.now(),광고주ID:id,금액:amt,차수:r,날짜:todayISO(),메모:''};
  DB.입금.push(tmp); rerender();
  bg(gs('addPayment',{광고주ID:id,금액:amt,차수:r}).then(function(res){ var row=(DB.입금||[]).filter(function(p){return p.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
}
function addCostRound(r){ var g=function(x){var e=document.getElementById(x);return e?e.value:'';}; var 내역=g('ec내역'), 금액=numVal(g('ec금액')); if(!금액) return toast('금액을 입력하세요');
  var tmp={ID:'tmp'+Date.now(),광고주ID:CUR,내역:내역,금액:금액,차수:r,날짜:todayISO()};
  DB.실행비.push(tmp); rerender(); // 즉시 반영
  bg(gs('addCost',{광고주ID:CUR,내역:내역,금액:금액,차수:r}).then(function(res){ var row=(DB.실행비||[]).filter(function(c){return c.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
}
function addPayRound(r){ var g=function(x){var e=document.getElementById(x);return e?e.value:'';}; var 금액=numVal(g('ep금액')), 메모=g('ep메모'); if(!금액) return toast('금액을 입력하세요');
  var tmp={ID:'tmp'+Date.now(),광고주ID:CUR,금액:금액,메모:메모,차수:r,날짜:todayISO()};
  DB.입금.push(tmp); rerender();
  bg(gs('addPayment',{광고주ID:CUR,금액:금액,메모:메모,차수:r}).then(function(res){ var row=(DB.입금||[]).filter(function(p){return p.ID===tmp.ID;})[0]; if(row&&res&&res.ID){ row.ID=res.ID; } }));
}
function del(tab,id){ if(!confirm('삭제할까요?')) return; DB[tab]=(DB[tab]||[]).filter(function(r){return r.ID!==id;}); rerender(); bg(gs('delete',{탭:tab,ID:id})); }
// 명단(섭외) 삭제: 확인창 없이 바로 삭제, 되돌리기 토스트로 실수 방지
function delSeed(id){
  var row=(DB.섭외||[]).filter(function(r){return r.ID===id;})[0]; if(!row) return;
  var saved=Object.assign({},row);
  DB.섭외=(DB.섭외||[]).filter(function(r){return r.ID!==id;}); rerender();
  bg(gs('delete',{탭:'섭외',ID:id}));
  toastUndo('“'+((saved.계정명||'').trim()||'빈 칸')+'” 삭제됨', function(){ undoSeed(saved); });
}
function undoSeed(saved){
  var keys=['광고주ID','종류','계정명','진행여부','촬영일정','촬영시간','촬영여부','업로드일정','방문일정','방문시간','방문여부','URL','인스타URL','영수증URL','비고','공개','차수'];
  var payload={}; keys.forEach(function(k){ payload[k]=saved[k]!=null?saved[k]:''; }); if(!payload.공개) payload.공개='Y'; if(!payload.차수) payload.차수=1;
  var tmp=Object.assign({ID:'tmp'+Date.now()},payload); DB.섭외.push(tmp); rerender();
  bg(gs('addSeed',payload).then(function(res){ var r=(DB.섭외||[]).filter(function(s){return s.ID===tmp.ID;})[0]; if(r&&res&&res.ID) r.ID=res.ID; }));
  toast('되돌렸어요');
}
function toastUndo(msg, undoFn){
  var t=document.getElementById('toast'); if(!t) return;
  t.innerHTML=''; var span=document.createElement('span'); span.textContent=msg;
  var btn=document.createElement('button'); btn.className='toast-undo'; btn.textContent='되돌리기';
  btn.onclick=function(){ t.style.display='none'; t.innerHTML=''; undoFn(); };
  t.appendChild(span); t.appendChild(btn); t.style.display='block';
  clearTimeout(t._to); t._to=setTimeout(function(){ t.style.display='none'; t.innerHTML=''; },5000);
}

// ─── 신규 광고주 ───
function openNewClient() {
  CUR = null;
  document.getElementById('panel').innerHTML =
  '<div style="display:flex;justify-content:space-between"><h2>+ 광고주 등록</h2>' +
  '<button class="btn-ghost" onclick="closePanel()">✕</button></div>' +
  '<div class="sec"><div class="form-grid">' +
    '<input id="f매장명" placeholder="매장명 *"><input id="f지역" placeholder="지역 (예: 상무지구)">' +
    '<input id="f대표자" placeholder="대표자"><input id="f연락처" placeholder="연락처">' +
    '<input id="f담당직원" placeholder="담당 직원"><input id="f계약금액" type="number" placeholder="계약금액 (VAT포함)">' +
    '<input id="f계약일" type="date" class="full">' +
    '<textarea id="f메모" class="full" rows="2" placeholder="메모"></textarea>' +
    '<button class="btn-primary full" onclick="saveNewClient()">등록</button></div></div>';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('panel').classList.add('open');
}
function saveNewClient() {
  var g = function(id){ return document.getElementById('f'+id).value.trim(); };
  if (!g('매장명')) return toast('매장명은 필수예요');
  busy(gs('addClient',{매장명:g('매장명'),지역:g('지역'),대표자:g('대표자'),연락처:g('연락처'),
    담당직원:g('담당직원'),계약금액:g('계약금액'),계약일:g('계약일'),메모:g('메모')}).then(function(){closePanel();}));
}
