<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>도반글로벌 · 마케팅 현황</title>
<meta name="theme-color" content="#e8590c">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Malgun Gothic',sans-serif; }
  body { background:#f4f6f9; color:#222; padding-bottom:70px; }
  .wrap { max-width:560px; margin:0 auto; padding:20px 16px 20px; }
  .tabbar { position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; background:#fff;
            border-top:1px solid #eee; display:flex; z-index:20; box-shadow:0 -2px 10px rgba(0,0,0,.04); }
  .tabbar button { flex:1; border:none; background:none; padding:9px 0 11px; font-size:11px; color:#999; cursor:pointer; }
  .tabbar button.on { color:#e8590c; font-weight:700; }
  .tabbar .ic { display:block; font-size:19px; margin-bottom:2px; }
  .head { text-align:center; padding:26px 0 18px; }
  .head .co { color:#e8590c; font-weight:700; font-size:13px; letter-spacing:2px; }
  .head h1 { font-size:24px; margin-top:6px; }
  .head .sub { color:#888; font-size:13px; margin-top:4px; }
  .bar-wrap { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .bar-top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; }
  .bar { height:10px; background:#eee; border-radius:5px; overflow:hidden; }
  .bar div { height:100%; background:linear-gradient(90deg,#ff922b,#e8590c); border-radius:5px; }
  .sec { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .sec h3 { font-size:14px; color:#e8590c; margin-bottom:10px; }
  .row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #f4f4f4; font-size:14px; }
  .row:last-child { border-bottom:none; }
  .row .grow { flex:1; }
  .row small { display:block; color:#999; font-size:12px; }
  .st { font-size:12px; font-weight:600; padding:3px 10px; border-radius:12px; white-space:nowrap; }
  .st-완료 { background:#d3f9d8; color:#237a3b; }
  .st-진행중 { background:#fff3cd; color:#9a6700; }
  .st-대기 { background:#e9ecef; color:#666; }
  .log { padding:9px 0; border-bottom:1px solid #f4f4f4; font-size:14px; }
  .log:last-child { border-bottom:none; }
  .log .d { color:#e8590c; font-size:12px; font-weight:600; }
  footer { text-align:center; color:#aaa; font-size:12px; margin-top:26px; line-height:1.7; }
  .none { text-align:center; color:#aaa; padding:20px; font-size:13px; }
  .cc-group { margin-bottom:14px; }
  .cc-group:last-child { margin-bottom:0; }
  .rgroup { margin-bottom:12px; }
  .rgroup:last-child { margin-bottom:0; }
  .rgh { cursor:pointer; user-select:none; font-size:14px; font-weight:700; color:#333; padding:9px 11px; background:#f7f8fa; border:1px solid #eef0f3; border-radius:9px; margin-bottom:9px; display:flex; align-items:center; gap:7px; }
  .rgh:active { background:#eef0f3; }
  .rgh .rgh-ar { color:#e8590c; font-size:11px; }
  .rgh .rgh-c { color:#e8590c; font-size:12px; font-weight:600; margin-left:auto; }
  .cc-gh { font-size:13px; font-weight:700; color:#444; margin-bottom:8px; }
  .cc-gh span { color:#e8590c; font-size:12px; font-weight:500; margin-left:4px; }
  .cc { border:1px solid #eee; border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .cc.done { border-color:#c3f0cd; background:#f6fff8; }
  .cc-top { display:flex; justify-content:space-between; align-items:center; }
  .cc-name { font-weight:700; font-size:15px; }
  .cc-meta { font-size:12px; color:#999; margin-top:3px; }
  .cc-body { margin-top:8px; display:flex; flex-direction:column; gap:5px; }
  .cc-line { font-size:13px; color:#444; display:flex; align-items:center; gap:6px; }
  .cc-line .cc-ico { width:18px; text-align:center; }
  .cc-line .cc-lb { color:#999; min-width:38px; }
  .cc-line b { color:#222; font-weight:700; }
  .cc-tbd { color:#bbb; font-size:12px; }
  .cc-st { font-size:11px; font-weight:600; padding:3px 9px; border-radius:11px; white-space:nowrap; }
  .cst-예정 { background:#fff3cd; color:#9a6700; }
  .cst-편집 { background:#e7f0ff; color:#2c6ee0; }
  .cst-예약 { background:#efe9ff; color:#7048e8; }
  .cst-완료 { background:#d3f9d8; color:#237a3b; }
  .re-box { margin-top:10px; padding:10px 12px; background:#fff6fb; border:1px solid #ffd6ec; border-radius:10px; }
  .re-h { font-size:12px; font-weight:800; color:#c2185b; margin-bottom:7px; }
  .re-ids { display:flex; flex-wrap:wrap; gap:6px; }
  .re-id { display:inline-block; font-size:13px; font-weight:700; color:#c2185b; text-decoration:none; background:#fff; border:1px solid #f5c6da; border-radius:20px; padding:5px 12px; }
  .re-id:hover { background:#ffe3f0; }
  .ce-box { margin-top:10px; padding:9px 12px; border-radius:10px; font-size:12.5px; font-weight:700; color:#999; background:#f5f5f7; border:1px solid #eee; }
  .ce-box.on { color:#7048e8; background:#f3f0ff; border-color:#dcd0ff; }
  .ce-box.on b { color:#5f3dc4; }
  .re-due { font-size:12.5px; color:#8a5; margin-top:8px; color:#6d4c41; }
  .re-due b { color:#c2185b; }
  .cc-links { display:flex; gap:8px; flex-wrap:wrap; margin-top:9px; }
  .cc-link { display:inline-block; font-size:13px; font-weight:600; color:#e8590c; text-decoration:none;
             background:#fff4ec; padding:7px 14px; border-radius:9px; }
  .cc-link.sub { color:#555; background:#f1f3f5; }
  .cc-link:hover { background:#ffe8d6; }
  .inf-row { padding:9px 0; border-bottom:1px solid #f4f4f4; }
  .inf-row:last-child { border-bottom:none; }
  .inf-row label { display:block; font-size:12px; color:#888; margin-bottom:4px; }
  .inf-in { display:flex; gap:6px; align-items:center; }
  .inf-in input { flex:1; padding:9px 10px; border:1px solid #e3e3e3; border-radius:8px; font-size:14px; }
  .inf-in input:focus { outline:2px solid #e8590c; outline-offset:-1px; border-color:#e8590c; }
  .ci-row { padding:6px 0; }
  .ci-row label { display:block; font-size:12px; color:#888; margin-bottom:4px; }
  .ci-row input { width:100%; padding:9px 11px; border:1px solid #e3e3e3; border-radius:8px; font-size:14px; }
  .ci-row input:focus { outline:2px solid #e8590c; outline-offset:-1px; border-color:#e8590c; }
  .ci-plat { border:1px solid #eee; border-radius:12px; padding:10px 12px; margin:10px 0; background:#fafbfc; }
  .ci-ph { font-weight:700; font-size:15px; margin-bottom:4px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// 백엔드: Supabase RPC. URL/키 바뀌면 이 두 줄만 교체
var SB_URL = 'https://bgkdkfmdndhqgfdygmfm.supabase.co';
var SB_KEY = 'sb_publishable_KxsYIOy5d4i7TR5PVBExLg_8UvNz6v9';
function sbRpc(fn, args){
  return fetch(SB_URL+'/rest/v1/rpc/'+fn, { method:'POST',
    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(args||{}) }).then(function(r){ return r.json(); });
}
var data = null, CODE = null;
var app = document.getElementById('app');
function saveInfo(id, field, val){
  sbRpc('client_save_info', { p_code:CODE, p_info_id:id,
      p_val:(field==='값'?val:null), p_link:(field==='링크'?val:null) })
    .then(function(d){ if(!d||d.ok===false) alert('저장 실패'); });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function contentSection(list, only){
  var title = only==='insta' ? '📷 인스타' : only==='blog' ? '✍️ 블로그' : '콘텐츠 진행';
  var GROUPS = only==='insta' ? [['인스타','📷 인스타']] : only==='blog' ? [['블로그','✍️ 블로그']] : [['인스타','📷 인스타'],['블로그','✍️ 블로그']];
  var isBlog=function(s){ return s.종류==='블로그' || s.종류==='체험단'; };
  if(only==='insta') list = list.filter(function(s){return !isBlog(s);});
  else if(only==='blog') list = list.filter(isBlog);
  if(!list.length) return '<div class="sec"><h3>'+title+'</h3><div class="none">아직 등록된 콘텐츠가 없습니다</div></div>';
  var bad=function(v){ v=String(v==null?'':v).trim(); return !v || v.indexOf('--')>=0 || v.indexOf('1899')===0 || v.indexOf('1970')===0; }; // 시간전용 셀이 날짜로 잘못 직렬화된 값 제거
  var clean=function(v){ if(bad(v)) return ''; var s=String(v).trim(); if(/^\d{6}$/.test(s)) return '20'+s.slice(0,2)+'-'+s.slice(2,4)+'-'+s.slice(4,6); return v; }; // 260709 → 2026-07-09
  var DOWK=['일','월','화','수','목','금','토'];
  var dow=function(d){ var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(String(d==null?'':d).trim()); if(!m) return ''; var dt=new Date(+m[1],+m[2]-1,+m[3]); return isNaN(dt)?'':' ('+DOWK[dt.getDay()]+')'; };
  var fmt=function(d,t){ d=clean(d); if(!d) return ''; t=clean(t); return esc(d)+dow(d)+(t?' '+esc(t):''); };
  var line=function(ico,label,val,tbd){ return '<div class="cc-line"><span class="cc-ico">'+ico+'</span><span class="cc-lb">'+label+'</span>'+(val?'<b>'+val+'</b>':'<span class="cc-tbd">'+tbd+'</span>')+'</div>'; };
  var status=function(s,blog){ // 관리자 진행여부 우선 → 없으면 촬영/방문여부로 판별
    var p = s.진행여부;
    if(p==='게시완료' || p==='완료' || s.URL || s.인스타URL || s.완료) return { label:'게시 완료', cls:'완료', color:'#237a3b' };
    if(p==='편집중' || p==='작성중' || p==='진행중') return { label: blog?'글 작성 중':'편집 중', cls:'편집', color:'#2c6ee0' };
    if(p==='예약완료') return { label:'예약 완료', cls:'예약', color:'#7048e8' };
    if(p==='촬영예정' || p==='방문예정' || p==='대기') return { label: blog?'방문 예정':'촬영 예정', cls:'예정', color:'#9a6700' };
    var did = blog ? (s.방문여부==='완료') : (s.촬영여부==='완료');
    if(did) return { label: blog?'글 작성 중':'편집 중', cls:'편집', color:'#2c6ee0' };
    return { label: blog?'방문 예정':'촬영 예정', cls:'예정', color:'#9a6700' };
  };
  var reviewEvent=function(s){
    var raw=String(s.리뷰이벤트||'').trim(); if(!raw) return '';
    var ids=raw.split(/[\s,]+/).filter(Boolean);
    var chips=ids.map(function(id){
      var disp, u;
      if(/^https?:\/\//i.test(id)){ u=id; disp='@'+id.replace(/^https?:\/\/(www\.)?instagram\.com\//i,'').replace(/[\/?].*$/,''); }
      else { disp='@'+id.replace(/^@/,''); u='https://instagram.com/'+id.replace(/^@/,''); }
      return '<a class="re-id" href="'+esc(u)+'" target="_blank">'+esc(disp)+'</a>';
    }).join('');
    var due=clean(s.리뷰이벤트기한);
    var dueHtml = due ? '<div class="re-due">🗓 <b>'+esc(due)+dow(due)+'</b> 까지 사용</div>' : '';
    return '<div class="re-box"><div class="re-h">🎁 리뷰 이벤트 당첨자</div><div class="re-ids">'+chips+'</div>'+dueHtml+'</div>';
  };
  var commentEvent=function(s){
    if(isBlog(s)) return '';                 // 인스타(인플루언서) 카드에만
    var v = String(s.댓글이벤트||'').trim();
    if(v!=='진행' && v!=='진행중') return ''; // 진행일 때만 표시, 없으면 안 뜸
    return '<div class="ce-box on">💬 댓글 이벤트 <b>진행</b></div>';
  };
  var card=function(s){
    var blog=isBlog(s), st=status(s,blog), up=(st.cls==='완료');
    var shoot = blog ? fmt(s.방문일정,s.방문시간) : fmt(s.촬영일정,s.촬영시간);
    if(!shoot && s.일정) shoot = esc(s.일정);
    var upload = clean(s.업로드일정) ? esc(clean(s.업로드일정)) : '';
    var url = s.URL || s.인스타URL || '';
    var body =
      line(blog?'🏠':'📸', blog?'방문':'촬영', shoot, blog?'방문 일정 조율 중':'촬영 일정 조율 중') +
      (blog ? '' : line('📤','업로드', upload, up?'':'촬영 후 안내')) +
      line('🔖','상태', '<span style="color:'+st.color+';font-weight:700">'+st.label+'</span>', '');
    var links = '';
    if(url) links += '<a class="cc-link" href="'+esc(url)+'" target="_blank">🔗 '+(blog?'후기 보기':'콘텐츠 보기')+'</a>';
    if(blog){ var iurl=String(s.인스타URL||'').trim(); if(iurl && iurl!==url){ var isInsta=/instagram\.com/i.test(iurl); links += '<a class="cc-link" href="'+esc(iurl)+'" target="_blank">'+(isInsta?'📱 인스타':'📎 네이버 클립')+'</a>'; } }
    if(s.영수증URL) links += '<a class="cc-link sub" href="'+esc(s.영수증URL)+'" target="_blank">🧾 영수증 리뷰</a>';
    return '<div class="cc'+(up?' done':'')+'">' +
      '<div class="cc-top"><span class="cc-name">'+esc(s.계정명||'섭외 진행 중')+'</span>' +
        '<span class="cc-st cst-'+st.cls+'">'+st.label+'</span></div>' +
      '<div class="cc-body">'+body+'</div>' +
      reviewEvent(s) +
      commentEvent(s) +
      (links?'<div class="cc-links">'+links+'</div>':'') +
    '</div>';
  };
  // 견적(차수)별로 묶어 토글 — 관리자 견적과 동일하게 (견적 없는 차수는 백엔드에서 이미 제외)
  var byR={}; list.forEach(function(s){ var r=Number(s.차수)||1; (byR[r]=byR[r]||[]).push(s); });
  var rounds=Object.keys(byR).map(Number).sort(function(a,b){return a-b;});
  var nameMap=(data&&data.견적명맵)||{};
  var groups = rounds.map(function(r){
    var arr=byR[r];
    var up=arr.filter(function(s){return !!s.완료;}).length;
    var key=(only||'x')+'_'+r, open = ROPEN[key]!==false;
    var label = nameMap[r] || (r+'차 견적'); // 견적명(점심마케팅 등), 없으면 N차 견적
    var hdr = '<div class="rgh" onclick="toggleRound(\''+key+'\')"><span class="rgh-ar">'+(open?'▼':'▶')+'</span> '+esc(label)+' <span class="rgh-c">'+up+'/'+arr.length+' 완료</span></div>';
    var body = open ? arr.map(card).join('') : ''; // 한 개여도 무조건 토글
    return '<div class="rgroup">'+hdr+body+'</div>';
  }).join('');
  var head = '<h3>'+title+' <span style="font-size:12px;color:#e8590c;font-weight:600">'+list.filter(function(s){return !!s.완료;}).length+'/'+list.length+' 완료</span></h3>';
  return '<div class="sec">'+head+groups+'</div>';
}

function showTab(n, btn){
  ['home','insta','blog','info','log','doc'].forEach(function(t){ var e=document.getElementById('tab-'+t); if(e) e.style.display = t===n?'':'none'; });
  Array.from(document.querySelectorAll('.tabbar button')).forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); window.scrollTo(0,0);
}
var ROPEN = {}; // 견적(차수) 그룹 펼침 상태 {키:false=접힘}
function toggleRound(key){
  ROPEN[key] = ROPEN[key]===false ? true : false; // 기본 펼침 → 처음 누르면 접힘
  var it=document.getElementById('tab-insta'); if(it) it.innerHTML=contentSection(data.콘텐츠||[], 'insta');
  var bt=document.getElementById('tab-blog'); if(bt) bt.innerHTML=contentSection(data.콘텐츠||[], 'blog');
}

// ─── 점주 로그인 게이트 ───
var AUTHKEY = 'doban_client_' + (location.search || '');
function needLogin(){ return data && data.로그인ID && localStorage.getItem(AUTHKEY)!=='ok'; }
function renderLogin(msg){
  app.innerHTML =
    '<div class="head"><div class="co">DOBAN GLOBAL</div><h1>'+esc(data.매장명)+'</h1><div class="sub">마케팅 현황 로그인</div></div>' +
    '<div class="sec" style="max-width:340px;margin:0 auto">' +
      '<input id="lid" placeholder="아이디" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:9px;margin-bottom:8px;font-size:15px">' +
      '<input id="lpw" type="password" placeholder="비밀번호" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:9px;font-size:15px" onkeydown="if(event.key===\'Enter\')doLogin()">' +
      (msg?'<div style="color:#c92a2a;font-size:13px;margin-top:8px">'+msg+'</div>':'') +
      '<button onclick="doLogin()" style="width:100%;margin-top:12px;padding:12px;background:#e8590c;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer">로그인</button>' +
    '</div>' +
    '<footer>도반글로벌 유한회사 · 010-2944-1236</footer>';
}
function doLogin(){
  var id=document.getElementById('lid').value.trim(), pw=document.getElementById('lpw').value.trim();
  if(String(id)===String(data.로그인ID) && String(pw)===String(data.로그인PW)){ localStorage.setItem(AUTHKEY,'ok'); renderApp(); }
  else renderLogin('아이디 또는 비밀번호가 틀렸습니다');
}

function notFound(msg){
  app.innerHTML = '<div class="head"><h1>페이지를 찾을 수 없어요</h1><div class="sub">'+(msg||'링크를 다시 확인해주세요')+'</div></div>';
}

// ─── 데이터 로드 ───
function boot(){
  var code = new URLSearchParams(location.search).get('c');
  if(code){ // 기존 링크(?c=코드) 하위호환
    CODE = code;
    app.innerHTML = '<div class="head"><div class="co">DOBAN GLOBAL</div><div class="sub" style="margin-top:20px">불러오는 중…</div></div>';
    sbRpc('client_data', { p_code: code })
      .then(function(d){
        if(!d || d.ok===false || !d.result){ notFound('없는 코드이거나 준비 중입니다'); return; }
        data = d.result; CODE = data.공유코드 || code;
        if(needLogin()) renderLogin(''); else renderApp();
      }).catch(function(){ notFound('서버 연결에 실패했습니다'); });
    return;
  }
  // 아이디 로그인 방식 (링크 없이 각자 로그인)
  var saved = localStorage.getItem('doban_client_login');
  if(saved){ try{ var s=JSON.parse(saved);
    var cached = localStorage.getItem('doban_client_cache_'+s.id); // 이전에 받은 데이터 즉시 표시
    if(cached){ try{ data=JSON.parse(cached); CODE=data.공유코드||null; renderApp(); }catch(e){} }
    clientLoginFetch(s.id, s.pw, true); return; // 최신 데이터는 백그라운드로 새로고침
  }catch(e){} }
  renderStandaloneLogin('');
}
function renderStandaloneLogin(msg){
  app.innerHTML =
    '<div class="head"><div class="co">DOBAN GLOBAL</div><h1>마케팅 현황</h1><div class="sub">매장 아이디로 로그인</div></div>' +
    '<div class="sec" style="max-width:340px;margin:0 auto">' +
      '<input id="lid" placeholder="아이디" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:9px;margin-bottom:8px;font-size:15px">' +
      '<input id="lpw" type="password" placeholder="비밀번호" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:9px;font-size:15px" onkeydown="if(event.key===\'Enter\')doStandaloneLogin()">' +
      (msg?'<div style="color:#c92a2a;font-size:13px;margin-top:8px">'+msg+'</div>':'') +
      '<button onclick="doStandaloneLogin()" style="width:100%;margin-top:12px;padding:12px;background:#e8590c;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer">로그인</button>' +
    '</div><footer>도반글로벌 유한회사 · 010-2944-1236</footer>';
}
function doStandaloneLogin(){
  var id=document.getElementById('lid').value.trim(), pw=document.getElementById('lpw').value.trim();
  if(!id||!pw){ renderStandaloneLogin('아이디·비밀번호를 입력하세요'); return; }
  clientLoginFetch(id, pw, false);
}
function clientLoginFetch(id, pw, silent){
  if(!silent) app.innerHTML='<div class="head"><div class="co">DOBAN GLOBAL</div><div class="sub" style="margin-top:20px">로그인 중…</div></div>';
  sbRpc('client_login', { p_id:id, p_pw:pw })
    .then(function(d){
      if(!d || d.ok===false || !d.result){ localStorage.removeItem('doban_client_login'); renderStandaloneLogin('아이디 또는 비밀번호가 틀렸습니다'); return; }
      data = d.result; CODE = data.공유코드 || null;
      localStorage.setItem('doban_client_login', JSON.stringify({ id:id, pw:pw }));
      try{ localStorage.setItem('doban_client_cache_'+id, JSON.stringify(d.result)); }catch(e){} // 다음 방문 즉시 로딩용 캐시
      renderApp();
    }).catch(function(){ renderStandaloneLogin('서버 연결에 실패했습니다'); });
}
function clientLogout(){ localStorage.removeItem('doban_client_login'); localStorage.removeItem(AUTHKEY); location.reload(); }

function renderApp() {
  var done = data.작업.filter(function(t){return t.상태==='완료';}).length;
  var total = data.작업.length;
  var pct = total ? Math.round(done/total*100) : 0;

  var homeTab =
    '<div class="bar-wrap"><div class="bar-top"><b>전체 진행률</b><span>'+done+'/'+total+' 완료 ('+pct+'%)</span></div>' +
    '<div class="bar"><div style="width:'+pct+'%"></div></div></div>' +
    '<div class="sec"><h3>작업 항목</h3>' +
    (data.작업.map(function (t) {
      return '<div class="row"><div class="grow">'+esc(t.품목)+
        '<small>'+esc(t.세부내용)+(t.완료일?' · 완료일 '+esc(t.완료일):'')+'</small></div>' +
        '<span class="st st-'+esc(t.상태)+'">'+esc(t.상태)+'</span></div>';
    }).join('') || '<div class="none">등록된 작업이 없습니다</div>') + '</div>';

  var logTab = '<div class="sec"><h3>진행 기록</h3>' +
    ((data.로그||[]).slice().reverse().map(function (l) {
      return '<div class="log"><span class="d">'+esc(l.날짜)+'</span><br>'+esc(l.내용)+'</div>';
    }).join('') || '<div class="none">아직 기록이 없습니다</div>') + '</div>';

  var docTab = '<div class="sec"><h3>계약서</h3><div class="none">준비 중입니다.<br>계약서·전자서명이 곧 여기에 표시됩니다.</div></div>';

  var infoTab = (function(){
    var infos=(data.정보||[]).slice().sort(function(a,b){return (Number(a.순서)||0)-(Number(b.순서)||0);});
    if(!infos.length) return '<div class="sec"><h3>내 계정 정보</h3><div class="none">정보 항목이 아직 없어요.</div></div>';
    var ICON={'네이버':'🟢','인스타':'📷','구글':'🔵','카카오':'🟡','당근':'🥕'};
    function pk(항목){var s=String(항목).replace(/\s+/g,'');if(/(비밀번호|비번)$/.test(s))return{p:s.replace(/(비밀번호|비번)$/,''),k:'pw'};if(/아이디$/.test(s))return{p:s.replace(/아이디$/,''),k:'id'};return null;}
    function row(f, sub){ return '<div class="ci-row"><label>'+esc(sub||f.항목)+'</label>' +
      '<input value="'+esc(f.값||'')+'" placeholder="입력" onchange="saveInfo(\''+f.ID+'\',\'값\',this.value)"></div>'; }
    var used={}, basic='', order=[], groups={};
    infos.forEach(function(f){ var k=pk(f.항목); if(k){ used[f.ID]=1; if(!groups[k.p]){groups[k.p]={id:null,pw:null};order.push(k.p);} groups[k.p][k.k]=f; } });
    infos.forEach(function(f){ if(!used[f.ID]) basic+=row(f); });
    var plat=order.map(function(p){ var g=groups[p], lr=g.id||g.pw, link=(lr&&lr.링크)||'';
      return '<div class="ci-plat"><div class="ci-ph">'+(ICON[p]||'🔗')+' '+esc(p)+(link?' <a class="cc-link" href="'+esc(link)+'" target="_blank" style="padding:4px 10px">→ 바로가기</a>':'')+'</div>' +
        (g.id?row(g.id,'아이디'):'')+(g.pw?row(g.pw,'비밀번호'):'')+'</div>'; }).join('');
    return '<div class="sec"><h3>내 계정 정보</h3>' +
      '<div style="font-size:12px;color:#999;margin-bottom:10px">아이디·비밀번호 등을 입력해두시면 담당자가 대신 관리해드려요. (입력하면 자동 저장)</div>' +
      basic + plat + '</div>';
  })();

  app.innerHTML =
    '<div class="head"><div class="co">DOBAN GLOBAL</div><h1>'+esc(data.매장명)+'</h1>' +
    '<div class="sub">마케팅 진행 현황 <a onclick="clientLogout()" style="color:#c92a2a;cursor:pointer;font-size:12px;margin-left:8px;text-decoration:underline">로그아웃</a></div></div>' +
    '<div id="tab-home" class="tabpane">'+homeTab+'</div>' +
    '<div id="tab-insta" class="tabpane" style="display:none">'+contentSection(data.콘텐츠 || [], 'insta')+'</div>' +
    '<div id="tab-blog" class="tabpane" style="display:none">'+contentSection(data.콘텐츠 || [], 'blog')+'</div>' +
    '<div id="tab-info" class="tabpane" style="display:none">'+infoTab+'</div>' +
    '<div id="tab-log" class="tabpane" style="display:none">'+logTab+'</div>' +
    '<div id="tab-doc" class="tabpane" style="display:none">'+docTab+'</div>' +
    '<footer>도반글로벌 유한회사<br>광주광역시 광산구 왕버들로 101, 2층 · 010-2944-1236</footer>' +
    '<nav class="tabbar">' +
      '<button class="on" onclick="showTab(\'home\',this)"><span class="ic">📊</span>진행현황</button>' +
      '<button onclick="showTab(\'insta\',this)"><span class="ic">📷</span>인스타</button>' +
      '<button onclick="showTab(\'blog\',this)"><span class="ic">✍️</span>블로그</button>' +
      '<button onclick="showTab(\'info\',this)"><span class="ic">📋</span>내정보</button>' +
      '<button onclick="showTab(\'log\',this)"><span class="ic">📝</span>기록</button>' +
      '<button onclick="showTab(\'doc\',this)"><span class="ic">📄</span>계약서</button>' +
    '</nav>';
}

boot();
